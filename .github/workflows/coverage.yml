name: Coverage

on:
  push:
    branches: [main, rewrite]
    paths-ignore:
      - 'docs/**'
      - '.beads/**'
      - '**/*.md'
  pull_request:
    branches: [main, rewrite]
    paths-ignore:
      - 'docs/**'
      - '.beads/**'
      - '**/*.md'
  workflow_dispatch:
    inputs:
      full:
        description: Include ignored medium and full Rust regressions
        type: boolean
        default: false
  schedule:
    - cron: '41 6 * * 1'

jobs:
  rust-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate workspace Rust coverage once
        env:
          FULL_COVERAGE: ${{ github.event_name == 'schedule' || inputs.full == true }}
        run: |
          mkdir -p coverage
          if [ "$FULL_COVERAGE" = "true" ]; then
            cargo llvm-cov nextest --release --workspace --all-features --run-ignored all --lcov --output-path coverage/rust.lcov
          else
            cargo llvm-cov nextest --workspace --all-features --lcov --output-path coverage/rust.lcov
          fi
      - uses: codecov/codecov-action@v5
        with:
          files: coverage/rust.lcov
          flags: rust
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  web-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Run clean-checkout web coverage with the test-only WASM alias
        working-directory: web
        run: npm ci && npm run test:unit:coverage
      - uses: codecov/codecov-action@v5
        with:
          files: web/coverage/lcov.info
          flags: web
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  cli-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - name: Run CLI coverage without rebuilding WASM
        working-directory: cli
        env:
          TS_NODE_COMPILER_OPTIONS: '{"sourceMap":true,"inlineSources":true}'
        run: npm ci && npm run test:coverage
      - uses: codecov/codecov-action@v5
        with:
          files: cli/coverage/lcov.info
          flags: cli
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  summary:
    if: always()
    needs: [rust-coverage, web-coverage, cli-coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Require all language reports
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          node -e "const jobs=JSON.parse(process.env.RESULTS); const bad=Object.entries(jobs).filter(([,job])=>job.result!=='success'); if(bad.length){console.error(bad.map(([name,job])=>name+': '+job.result).join('\n')); process.exit(1)}"
