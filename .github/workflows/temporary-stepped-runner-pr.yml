name: Temporary stepped runner PR executor

on:
  pull_request:
    branches:
      - refactor/web-stepped-runner-executor
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  refactor-test-commit:
    if: github.repository == 'hinsley/Fork'
    runs-on: ubuntu-latest
    steps:
      - name: Check out automation source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: automation

      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: refactor/web-stepped-runner-executor
          fetch-depth: 0
          path: target

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: target/web/package-lock.json

      - name: Install web dependencies
        working-directory: target/web
        run: npm ci

      - name: Apply stepped runner refactor
        working-directory: target
        run: python ../automation/.github/scripts/refactor_stepped_runner.py

      - name: Verify refactor shape
        working-directory: target
        shell: bash
        run: |
          git diff --check
          test "$(grep -c "runSteppedRunnerToCompletion" web/src/compute/worker/forkCoreWorker.ts)" -eq 17
          ! grep -q "computeBatchSize" web/src/compute/worker/forkCoreWorker.ts
          ! grep -q "let progress = runner.get_progress()" web/src/compute/worker/forkCoreWorker.ts

      - name: Lint web
        working-directory: target/web
        run: npm run lint

      - name: Run web unit tests
        working-directory: target/web
        run: npm run test:unit

      - name: Build web
        working-directory: target/web
        run: npm run build

      - name: Commit tested refactor
        working-directory: target
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            web/src/compute/worker/forkCoreWorker.ts \
            web/src/compute/worker/steppedRunner.ts \
            web/src/compute/worker/steppedRunner.test.ts
          git diff --cached --check
          git commit -m "refactor(web): centralize stepped runner execution"
          git push origin HEAD:refs/heads/refactor/web-stepped-runner-executor

      - name: Close and remove temporary PR branch
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr close "$PR_NUMBER" \
            --repo hinsley/Fork \
            --comment "Automation completed: the tested refactor was committed to refactor/web-stepped-runner-executor." \
            --delete-branch
