name: Slow cycle references

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'

jobs:
  full-rust-regressions:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest

      - name: Run medium numerical regressions
        run: node scripts/test-rust-tier.mjs medium

      - name: Run extreme numerical regressions
        run: node scripts/test-rust-tier.mjs extreme

      - name: Run published Orbit-to-curve references in release mode
        run: node scripts/test-rust-tier.mjs published
